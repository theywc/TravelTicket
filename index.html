<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="旅遊手帳">
<meta name="theme-color" content="#ffffff">
<title>旅遊手帳</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--card:#fff;--text:#1a1a1a;--text2:#6b6b6b;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --accent:#1a5fa8;--accent-bg:#e8f0fb;
  --green-bg:#eaf3de;--green-text:#27500a;
  --amber-bg:#faeeda;--amber-text:#633806;
  --red-bg:#fcebeb;--red-text:#791f1f;
  --r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--card:#1e1e1c;--text:#f0ede8;--text2:#9a9890;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --accent:#6baee8;--accent-bg:#0c2a4a;
  --green-bg:#173404;--green-text:#c0dd97;
  --amber-bg:#412402;--amber-text:#fac775;
  --red-bg:#501313;--red-text:#f7c1c1;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

.nav{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px}
.nav-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.nav-sub{font-size:12px;color:var(--text2);margin-top:1px}
.nav-btn{background:none;border:1px solid var(--border2);border-radius:var(--rs);padding:6px 12px;font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:4px}

.tabs{display:flex;background:var(--card);border-bottom:0.5px solid var(--border)}
.tab{flex:1;padding:10px 0;text-align:center;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}

.view{display:none;padding:16px}
.view.active{display:block}

/* CARDS */
.day-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.day-card-header{padding:12px 14px 10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.day-card-header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-badge{font-size:13px;font-weight:600;padding:3px 10px;border-radius:6px}
.badge-ok{background:var(--green-bg);color:var(--green-text)}
.badge-mixed{background:var(--amber-bg);color:var(--amber-text)}
.badge-rain{background:var(--red-bg);color:var(--red-text)}
.badge-default{background:var(--accent-bg);color:var(--accent)}
.day-subtitle{font-size:13px;color:var(--text2)}
.day-edit-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:4px;flex-shrink:0}

.weather-strip{padding:8px 14px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:0.5px solid var(--border);background:var(--bg)}
.w-tag{font-size:11px;padding:2px 7px;border-radius:5px;border:0.5px solid var(--border);color:var(--text2);background:var(--card)}

.slots{padding:0 14px}
.slot{display:flex;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);align-items:flex-start}
.slot:last-child{border-bottom:none}
.slot-time{font-size:11px;color:var(--text2);min-width:44px;margin-top:2px;flex-shrink:0}
.slot-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4}
.slot-title.hi{color:var(--accent)}
.slot-note{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.slot-del{background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;padding:2px;flex-shrink:0;margin-top:1px}

.add-slot-btn{display:flex;align-items:center;gap:6px;width:100%;padding:10px 14px;background:none;border:none;border-top:0.5px solid var(--border);color:var(--accent);font-size:13px;cursor:pointer;text-align:left}

.outfit-box{margin:10px 14px 0;background:var(--bg);border-radius:var(--rs);padding:10px 12px}
.outfit-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.outfit-items{display:flex;gap:5px;flex-wrap:wrap}
.outfit-item{font-size:12px;padding:3px 8px;border-radius:5px;background:var(--card);border:0.5px solid var(--border);color:var(--text)}

.tip-box{background:var(--accent-bg);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--accent);margin:0 0 12px;line-height:1.6;display:flex;gap:6px}

/* SUB SECTIONS (tickets inside day) */
.sub-section{padding:0 14px 12px;margin-top:4px}
.sub-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;border-top:0.5px solid var(--border)}
.sub-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.05em;text-transform:uppercase}
.sub-add-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px}
.ticket-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.ticket-row:last-child{border-bottom:none}
.t-icon{width:32px;height:32px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.t-icon.flight{background:#dbeafe}.t-icon.train{background:#dcfce7}.t-icon.attraction{background:#fef9c3}.t-icon.hotel{background:#fce7f3}.t-icon.other{background:#f3f4f6}
.t-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.t-sub{font-size:11px;color:var(--text2);margin-top:1px}
.no-items{font-size:13px;color:var(--text2);padding:6px 0 2px}

/* ALL TICKETS */
.section-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin:1.25rem 0 8px}
.ticket-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.ticket-card:active{opacity:.8}
.tc-icon{width:42px;height:42px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tc-info{flex:1;min-width:0}
.tc-title{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-sub{font-size:12px;color:var(--text2);margin-top:2px}
.tc-time{font-size:13px;color:var(--text2);flex-shrink:0}

/* SHOPPING */
.shop-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.shop-stat{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center}
.shop-stat-num{font-size:22px;font-weight:600;color:var(--text)}
.shop-stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.shop-item{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rs);padding:11px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer}
.shop-item.done{opacity:.4}
.shop-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.shop-item.done .shop-check{background:var(--accent);border-color:var(--accent);color:#fff}
.shop-item-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.shop-item.done .shop-item-name{text-decoration:line-through}
.shop-item-note{font-size:12px;color:var(--text2);margin-top:2px}
.shop-item-price{font-size:13px;color:var(--text2);flex-shrink:0}
.shop-del{background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:2px;flex-shrink:0}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px}
.cat-label{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.05em;text-transform:uppercase}
.cat-add{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.cat-btn{padding:11px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--rs);font-size:13px;cursor:pointer;color:var(--text);text-align:center}

/* SPOTS */
.spot-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.spot-icon{width:40px;height:40px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--accent-bg)}
.spot-info{flex:1;min-width:0}
.spot-name{font-size:15px;font-weight:500;color:var(--text)}
.spot-cat{font-size:11px;color:var(--text2);margin-top:2px}
.spot-note{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.spot-map-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--rs);padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;white-space:nowrap}
.spot-del{background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:4px}

/* SHEETS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 4px}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0}
.sheet-title{font-size:17px;font-weight:600}
.sheet-close{background:var(--bg);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2)}
.qr-area{margin:16px;background:var(--bg);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.qr-hint{font-size:12px;color:var(--text2)}
.detail-list{padding:0 16px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:14px}
.detail-row:last-child{border-bottom:none}
.dk{color:var(--text2)}
.dv{font-weight:500;color:var(--text);text-align:right;max-width:62%}
.sheet-actions{padding:12px 16px 4px;display:flex;flex-direction:column;gap:8px}
.btn-primary{width:100%;padding:13px;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-danger{width:100%;padding:13px;border:0.5px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:#c0392b;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}

/* FULLSCREEN QR */
.fs-qr{display:none;position:fixed;inset:0;background:#fff;z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px}
.fs-qr.open{display:flex}
.fs-name{font-size:20px;font-weight:600;color:#111;text-align:center}
.fs-sub{font-size:14px;color:#666;text-align:center}
.fs-close{position:fixed;top:20px;right:20px;background:#eee;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}

/* FORMS */
.form-group{padding:0 16px;margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:10px 12px;border-radius:var(--rs);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:15px;font-family:inherit}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-textarea{width:100%;padding:10px 12px;border-radius:var(--rs);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;min-height:120px;resize:vertical}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-btn{padding:10px 8px;border-radius:var(--rs);border:0.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;text-align:center;color:var(--text);transition:all .15s}
.type-btn.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:500}
.submit-wrap{padding:8px 16px 16px}
.btn-submit{width:100%;padding:14px;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;font-size:16px;font-weight:500;cursor:pointer}

.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.22)}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px;line-height:2}
.import-prompt{text-align:center;padding:2.5rem 1rem}
.import-prompt h2{font-size:18px;font-weight:500;margin-bottom:8px}
.import-prompt p{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:1.5rem}
.btn-import{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:15px;cursor:pointer}
.import-err{font-size:13px;color:#c0392b;padding:0 16px 8px;display:none}
.divider{height:0.5px;background:var(--border);margin:4px 0}
</style>
</head>
<body>

<div class="nav">
  <div>
    <div class="nav-title" id="nav-title">🗾 旅遊手帳</div>
    <div class="nav-sub" id="nav-sub">點行程 tab 匯入或新增</div>
  </div>
  <button class="nav-btn" id="import-nav-btn" onclick="openSheet('import-sheet')">
    <i class="ti ti-upload"></i> 匯入
  </button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('itinerary',this)">行程</div>
  <div class="tab" onclick="switchTab('tickets',this)">票券</div>
  <div class="tab" onclick="switchTab('shopping',this)">購物</div>
  <div class="tab" onclick="switchTab('spots',this)">景點</div>
</div>

<div class="view active" id="view-itinerary"><div id="itin-container"></div></div>
<div class="view" id="view-tickets"><div id="tickets-container"></div></div>
<div class="view" id="view-shopping"><div id="shopping-container"></div></div>
<div class="view" id="view-spots"><div id="spots-container"></div></div>

<button class="fab" id="fab-btn" onclick="fabAction()"><i class="ti ti-plus"></i></button>

<!-- TICKET DETAIL -->
<div class="overlay" id="ticket-detail" onclick="bgClose(event,'ticket-detail')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="td-title"></span>
      <button class="sheet-close" onclick="closeSheet('ticket-detail')"><i class="ti ti-x"></i></button>
    </div>
    <div class="qr-area" id="td-img-area">
      <div id="td-img-wrap" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:10px">
        <div id="td-no-img" style="font-size:13px;color:var(--text2);padding:1rem 0">尚未上傳票券圖片</div>
        <img id="td-img" style="display:none;max-width:100%;border-radius:8px;cursor:pointer" onclick="openFullscreen()" alt="票券圖片">
      </div>
      <span class="qr-hint">點圖片全螢幕放大給工作人員掃</span>
    </div>
    <div class="detail-list" id="td-rows"></div>
    <div class="sheet-actions">
      <button class="btn-primary" id="td-fullscreen-btn" onclick="openFullscreen()"><i class="ti ti-maximize"></i> 全螢幕放大圖片</button>
      <button class="btn-danger" onclick="deleteTicket()"><i class="ti ti-trash"></i> 刪除票券</button>
    </div>
  </div>
</div>

<!-- ADD TICKET -->
<div class="overlay" id="add-ticket" onclick="bgClose(event,'add-ticket')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">新增票券</span><button class="sheet-close" onclick="closeSheet('add-ticket')"><i class="ti ti-x"></i></button></div>
    <div style="height:14px"></div>
    <div class="form-group">
      <div class="form-label">類型</div>
      <div class="type-grid">
        <button class="type-btn sel" data-v="flight" onclick="selBtn(this,'ttype')">✈️ 機票</button>
        <button class="type-btn" data-v="train" onclick="selBtn(this,'ttype')">🚄 火車/地鐵</button>
        <button class="type-btn" data-v="attraction" onclick="selBtn(this,'ttype')">🎡 景點門票</button>
        <button class="type-btn" data-v="hotel" onclick="selBtn(this,'ttype')">🏨 飯店/住宿</button>
        <button class="type-btn" data-v="other" onclick="selBtn(this,'ttype')" style="grid-column:1/-1">🎟 其他</button>
      </div>
    </div>
    <div class="form-group"><label class="form-label">名稱</label><input class="form-input" id="tk-name" type="text" placeholder="例：阿寒湖遊船票"></div>
    <div class="form-group"><label class="form-label">日期</label><input class="form-input" id="tk-date" type="date"></div>
    <div class="form-group"><label class="form-label">時間（選填）</label><input class="form-input" id="tk-time" type="time"></div>
    <div class="form-group"><label class="form-label">備註（選填）</label><input class="form-input" id="tk-note" type="text" placeholder="例：座位 12A"></div>
    <div class="form-group">
      <label class="form-label">票券圖片（截圖或照片）</label>
      <div id="tk-img-preview" style="display:none;margin-bottom:8px;position:relative">
        <img id="tk-img-thumb" style="width:100%;border-radius:var(--rs);max-height:200px;object-fit:contain;background:var(--bg)" alt="">
        <button onclick="clearTicketImg()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px"><i class="ti ti-x"></i></button>
      </div>
      <label style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border:0.5px dashed var(--border2);border-radius:var(--rs);cursor:pointer;font-size:14px;color:var(--accent);background:var(--accent-bg)">
        <i class="ti ti-photo-up"></i> 選擇圖片
        <input type="file" id="tk-img-file" accept="image/*" style="display:none" onchange="previewTicketImg(this)">
      </label>
    </div>
    <div class="submit-wrap"><button class="btn-submit" onclick="submitTicket()">加入票夾</button></div>
  </div>
</div>

<!-- ADD SHOP ITEM -->
<div class="overlay" id="add-shop" onclick="bgClose(event,'add-shop')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">新增購物項目</span><button class="sheet-close" onclick="closeSheet('add-shop')"><i class="ti ti-x"></i></button></div>
    <div style="height:14px"></div>
    <div class="form-group">
      <div class="form-label">分類</div>
      <div class="type-grid">
        <button class="type-btn sel" data-v="藥妝" onclick="selBtn(this,'scat')">💊 藥妝</button>
        <button class="type-btn" data-v="食品" onclick="selBtn(this,'scat')">🍜 食品</button>
        <button class="type-btn" data-v="伴手禮" onclick="selBtn(this,'scat')">🎁 伴手禮</button>
        <button class="type-btn" data-v="其他" onclick="selBtn(this,'scat')">📦 其他</button>
      </div>
    </div>
    <div class="form-group"><label class="form-label">品名</label><input class="form-input" id="sh-name" type="text" placeholder="例：DHC 唇膏"></div>
    <div class="form-group"><label class="form-label">備註（選填）</label><input class="form-input" id="sh-note" type="text" placeholder="例：松本清有賣"></div>
    <div class="form-group"><label class="form-label">預算（選填）</label><input class="form-input" id="sh-price" type="text" placeholder="例：¥1,200"></div>
    <div class="submit-wrap"><button class="btn-submit" onclick="submitShop()">加入清單</button></div>
  </div>
</div>

<!-- ADD SPOT -->
<div class="overlay" id="add-spot" onclick="bgClose(event,'add-spot')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">新增景點</span><button class="sheet-close" onclick="closeSheet('add-spot')"><i class="ti ti-x"></i></button></div>
    <div style="height:14px"></div>
    <div class="form-group">

      <div class="type-grid">
        <button class="type-btn sel" data-v="自然" onclick="selBtn(this,'spcat')">🏔 自然</button>
        <button class="type-btn" data-v="美食" onclick="selBtn(this,'spcat')">🍽 美食</button>
        <button class="type-btn" data-v="購物" onclick="selBtn(this,'spcat')">🛍 購物</button>
        <button class="type-btn" data-v="文化" onclick="selBtn(this,'spcat')">🏛 文化</button>
        <button class="type-btn" data-v="其他" onclick="selBtn(this,'spcat')" style="grid-column:1/-1">📍 其他</button>

    <div class="form-group"><label class="form-label">景點名稱</label><input class="form-input" id="sp-name" type="text" placeholder="例：旭山動物園"></div>
    <div class="form-group"><label class="form-label">備註（選填）</label><input class="form-input" id="sp-note" type="text" placeholder="例：開放時間 9:30–17:15"></div>
    <div class="form-group"><label class="form-label">Google Maps 網址（選填）</label><input class="form-input" id="sp-url" type="url" placeholder="貼上 maps.app.goo.gl/... 網址"></div>
    <div class="submit-wrap"><button class="btn-submit" onclick="submitSpot()">加入景點</button></div>

<div class="overlay" id="add-day" onclick="bgClose(event,'add-day')">
  <div class="sheet">

    <div style="height:14px"></div>
    <div class="form-group"><label class="form-label">日期</label><input class="form-input" id="dy-date" type="date"></div>

<!-- ADD SLOT -->
<div class="overlay" id="add-slot" onclick="bgClose(event,'add-slot')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">新增行程項目</span><button class="sheet-close" onclick="closeSheet('add-slot')"><i class="ti ti-x"></i></button></div>
    <div style="height:14px"></div>
    <div class="form-group"><label class="form-label">時間</label><input class="form-input" id="sl-time" type="text" placeholder="例：上午、14:00、傍晚"></div>
    <div class="form-group"><label class="form-label">標題</label><input class="form-input" id="sl-title" type="text" placeholder="例：摩周湖第一展望台"></div>
    <div class="form-group"><label class="form-label">備註（選填）</label><input class="form-input" id="sl-note" type="text" placeholder="例：越早去越好，霧氣散後視野最佳"></div>

<!-- IMPORT -->
<div class="overlay" id="import-sheet" onclick="bgClose(event,'import-sheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">匯入行程 JSON</span><button class="sheet-close" onclick="closeSheet('import-sheet')"><i class="ti ti-x"></i></button></div>
    <div style="height:14px"></div>
    <div class="form-group"><label class="form-label">貼上 hokkaido_data.json 內容</label><textarea class="form-textarea" id="import-json" placeholder="貼上 JSON 內容..."></textarea></div>

    <div class="submit-wrap" style="display:flex;gap:8px;padding-top:0">
      <button class="btn-submit" style="background:var(--bg);color:var(--text);border:0.5px solid var(--border2);flex:1;font-size:14px" onclick="closeSheet('import-sheet')">取消</button>
      <button class="btn-submit" style="flex:2" onclick="doImport()">匯入</button>

<!-- FULLSCREEN QR -->
<div class="fs-qr" id="fs-qr">
  <button class="fs-close" onclick="closeFullscreen()"><i class="ti ti-x"></i></button>
  <img id="fs-img" style="max-width:90vw;max-height:75vh;border-radius:8px;object-fit:contain" alt="票券圖片">
  <div class="fs-name" id="fs-name"></div>
  <div class="fs-sub" id="fs-sub"></div>
</div>

<script>
// ── STORAGE KEYS ──
const KEYS = { itin:'hk_itin_v3', days:'hk_days_v3', tickets:'hk_tix_v3', shop:'hk_shop_v3', spots:'hk_spots_v3' };

// ── STATE ──
let importedItin = null;   // from JSON import (trip meta + days)
let customDays = [];       // user-added days
let tickets = [];
let shopItems = [];
let spots = [];
let activeTab = 'itinerary';
let activeTicketId = null;
let addingSlotForDate = null;

// selector state
const SEL = { ttype:'flight', scat:'藥妝', spcat:'自然', dbadge:'ok' };

// ── CONSTANTS ──
const DAYS_WK = ['日','一','二','三','四','五','六'];
const TICON = {flight:'✈️',train:'🚄',attraction:'🎡',hotel:'🏨',other:'🎟'};
const TLABEL = {flight:'機票',train:'火車/地鐵',attraction:'景點門票',hotel:'飯店/住宿',other:'其他'};
const TCLS = {flight:'flight',train:'train',attraction:'attraction',hotel:'hotel',other:'other'};
const CATS = ['藥妝','食品','伴手禮','其他'];
const CAT_ICON = {'藥妝':'💊','食品':'🍜','伴手禮':'🎁','其他':'📦'};
const SPCATS = {'自然':'🏔','美食':'🍽','購物':'🛍','文化':'🏛','其他':'📍'};

// ── LOAD / SAVE ──
function loadAll(){
  try { importedItin = JSON.parse(localStorage.getItem(KEYS.itin)||'null'); } catch(e){}
  try { customDays = JSON.parse(localStorage.getItem(KEYS.days)||'[]'); } catch(e){ customDays=[]; }
  try { tickets = JSON.parse(localStorage.getItem(KEYS.tickets)||'[]'); } catch(e){ tickets=[]; }
  try { shopItems = JSON.parse(localStorage.getItem(KEYS.shop)||'[]'); } catch(e){ shopItems=[]; }
  try { spots = JSON.parse(localStorage.getItem(KEYS.spots)||'[]'); } catch(e){ spots=[]; }
}
function saveAll(){
  try {
    if(importedItin) localStorage.setItem(KEYS.itin, JSON.stringify(importedItin));
    localStorage.setItem(KEYS.days, JSON.stringify(customDays));
    localStorage.setItem(KEYS.tickets, JSON.stringify(tickets));
    localStorage.setItem(KEYS.shop, JSON.stringify(shopItems));
    localStorage.setItem(KEYS.spots, JSON.stringify(spots));
  } catch(e){}
}

// ── NAV ──
function updateNav(){
  const title = importedItin ? '🗾 '+importedItin.trip.title : '🗾 旅遊手帳';
  const sub = importedItin ? importedItin.trip.subtitle : '點右上角匯入行程 JSON';
  document.getElementById('nav-title').textContent = title;
  document.getElementById('nav-sub').textContent = sub;
}

// ── TABS ──
function switchTab(name, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-'+name).classList.add('active');
  activeTab = name;
  if(name==='itinerary') renderItinerary();
  if(name==='tickets') renderTickets();
  if(name==='shopping') renderShopping();
  if(name==='spots') renderSpots();
}

function fabAction(){
  if(activeTab==='itinerary') openSheet('add-day');
  else if(activeTab==='tickets') openAddTicket(null);
  else if(activeTab==='shopping') openSheet('add-shop');
  else if(activeTab==='spots') openSheet('add-spot');
}

// ── HELPERS ──
function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()} (${DAYS_WK[dt.getDay()]})`;
}
function getAllDays(){
  const map = {};
  // from imported JSON
  if(importedItin) importedItin.days.forEach(d=>{ map[d.date] = {...d, _src:'json'}; });
  // from custom (override or new)
  customDays.forEach(d=>{ map[d.date] = {...d, _src:'custom'}; });
  return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
}

// ── ITINERARY ──
function renderItinerary(){
  const c = document.getElementById('itin-container');
  const allDays = getAllDays();
  let html = '';

  if(importedItin && importedItin.trip.tip){
    html += `<div class="tip-box"><i class="ti ti-info-circle" aria-hidden="true"></i>${importedItin.trip.tip}</div>`;
  }

  if(allDays.length === 0){
    html += `<div class="import-prompt">
      <h2>還沒有行程</h2>
      <p>匯入 JSON 快速帶入行程<br>或點右下角 + 手動新增每一天</p>
      <button class="btn-import" onclick="openSheet('import-sheet')"><i class="ti ti-upload"></i> 匯入行程 JSON</button>
    </div>`;
    c.innerHTML = html; return;
  }

  allDays.forEach((day, i) => {
    const dayTickets = tickets.filter(t=>t.date===day.date).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const slots = day.slots || [];
    html += `<div class="day-card" data-date="${day.date}">
      <div class="day-card-header">
        <div class="day-card-header-left">
          <span class="date-badge badge-${day.badge||'default'}">${day.label}</span>
          <span class="day-subtitle">${day.subtitle||''}</span>
        </div>
        <button class="day-edit-btn" onclick="openEditDay('${day.date}')" title="編輯這天"><i class="ti ti-dots-vertical"></i></button>
      </div>`;

    if(day.weather && day.weather.length){
      html += `<div class="weather-strip">${day.weather.map(w=>`<span class="w-tag">${w}</span>`).join('')}</div>`;
    }

    if(slots.length){
      html += `<div class="slots">`;
      slots.forEach((s,j)=>{
        html += `<div class="slot">
          <div class="slot-time">${s.time}</div>
          <div class="slot-content" style="flex:1">
            <div class="slot-title${s.highlight?' hi':''}">${s.title}</div>
            ${s.note?`<div class="slot-note">${s.note}</div>`:''}
          </div>
          <button class="slot-del" onclick="delSlot('${day.date}',${j})" title="刪除"><i class="ti ti-x"></i></button>
        </div>`;
      });
      html += `</div>`;
    }

    html += `<button class="add-slot-btn" onclick="openAddSlot('${day.date}')"><i class="ti ti-plus"></i> 新增項目</button>`;

    if(day.outfit && day.outfit.length){
      html += `<div class="outfit-box"><div class="outfit-label">穿衣建議</div><div class="outfit-items">${day.outfit.map(o=>`<span class="outfit-item">${o}</span>`).join('')}</div></div>`;
    }

    // day tickets
    html += `<div class="sub-section">
      <div class="sub-header">
        <span class="sub-label">🎫 當日票券</span>
        <button class="sub-add-btn" onclick="openAddTicket('${day.date}')"><i class="ti ti-plus"></i> 新增</button>
      </div>`;
    if(dayTickets.length){
      dayTickets.forEach(t=>{
        html += `<div class="ticket-row" onclick="openTicketDetail(${t.id})">
          <div class="t-icon ${TCLS[t.type]||'other'}">${TICON[t.type]||'🎟'}</div>
          <div style="flex:1;min-width:0">
            <div class="t-name">${t.name}</div>
            <div class="t-sub">${TLABEL[t.type]||''}${t.time?' · '+t.time:''}${t.note?' · '+t.note:''}</div>
          </div>
          <i class="ti ti-chevron-right" style="color:var(--text2);font-size:14px"></i>
        </div>`;
      });
    } else {
      html += `<div class="no-items">尚無票券</div>`;
    }
    html += `</div></div>`;
  });

  html += `<div style="text-align:center;padding:.5rem 0 1rem;font-size:13px;color:var(--text2)">
    <button onclick="openSheet('import-sheet')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;text-decoration:underline">重新匯入 JSON</button>
  </div>`;

  c.innerHTML = html;
}

// ── DAY CRUD ──
function openEditDay(date){
  const all = getAllDays();
  const day = all.find(d=>d.date===date);
  if(!day) return;
  document.getElementById('add-day-title').textContent = '編輯行程';
  document.getElementById('dy-date').value = day.date;
  document.getElementById('dy-subtitle').value = day.subtitle||'';
  document.getElementById('dy-weather').value = (day.weather||[]).join('、');
  // set badge btn
  document.querySelectorAll('[data-v]').forEach(b=>{ if(b.closest('#add-day')) b.classList.toggle('sel', b.dataset.v===(day.badge||'ok')); });
  SEL.dbadge = day.badge||'ok';
  openSheet('add-day');
}

function submitDay(){
  const date = document.getElementById('dy-date').value;
  const subtitle = document.getElementById('dy-subtitle').value.trim();
  if(!date){ alert('請選擇日期'); return; }
  const weatherRaw = document.getElementById('dy-weather').value.trim();
  const weather = weatherRaw ? weatherRaw.split(/[,、，]/).map(s=>s.trim()).filter(Boolean) : [];
  const dt = new Date(date+'T00:00:00');
  const label = `${dt.getMonth()+1}/${dt.getDate()}（${['日','一','二','三','四','五','六'][dt.getDay()]}）`;

  // check if exists in customDays
  const idx = customDays.findIndex(d=>d.date===date);
  const existing = getAllDays().find(d=>d.date===date);
  const newDay = {
    date, label, subtitle, badge: SEL.dbadge, weather,
    slots: existing ? (existing.slots||[]) : [],
    outfit: existing ? (existing.outfit||[]) : []
  };
  if(idx>=0) customDays[idx] = newDay;
  else customDays.push(newDay);
  saveAll(); closeSheet('add-day'); renderItinerary();
}

// ── SLOT CRUD ──
function openAddSlot(date){
  addingSlotForDate = date;
  ['sl-time','sl-title','sl-note'].forEach(id=>document.getElementById(id).value='');
  openSheet('add-slot');
}

function submitSlot(){
  const time = document.getElementById('sl-time').value.trim();
  const title = document.getElementById('sl-title').value.trim();
  const note = document.getElementById('sl-note').value.trim();
  if(!title){ alert('請輸入標題'); return; }
  const date = addingSlotForDate;
  // ensure day exists in customDays
  let day = customDays.find(d=>d.date===date);
  if(!day){
    // clone from importedItin if exists
    const src = getAllDays().find(d=>d.date===date);
    if(src){ day = {...src, slots:[...(src.slots||[])]}; customDays.push(day); }
    else { alert('找不到這天，請先建立行程'); return; }
  }
  day.slots = day.slots||[];
  day.slots.push({time, title, note, highlight:false});
  saveAll(); closeSheet('add-slot'); renderItinerary();
}

function delSlot(date, idx){
  let day = customDays.find(d=>d.date===date);
  if(!day){
    const src = getAllDays().find(d=>d.date===date);
    if(!src) return;
    day = {...src, slots:[...(src.slots||[])]};
    customDays.push(day);
  }
  day.slots = (day.slots||[]).filter((_,i)=>i!==idx);
  saveAll(); renderItinerary();
}

// ── TICKETS ──
function openAddTicket(date){
  document.getElementById('tk-date').value = date||new Date().toISOString().slice(0,10);
  ['tk-name','tk-time','tk-note','tk-qr'].forEach(id=>document.getElementById(id).value='');
  openSheet('add-ticket');
}

function submitTicket(){
  const name = document.getElementById('tk-name').value.trim();
  if(!name){ alert('請輸入名稱'); return; }
  tickets.push({id:Date.now(), type:SEL.ttype, name,
    date:document.getElementById('tk-date').value,
    time:document.getElementById('tk-time').value,
    note:document.getElementById('tk-note').value.trim(),
    img:pendingImgData||null});
  pendingImgData = null;
  clearTicketImg();
  saveAll(); closeSheet('add-ticket');
  renderItinerary(); renderTickets();
}

function openTicketDetail(id){
  const t = tickets.find(x=>x.id===id);
  if(!t) return;
  activeTicketId = id;
  document.getElementById('td-title').textContent = t.name;
  document.getElementById('fs-name').textContent = t.name;
  document.getElementById('fs-sub').textContent = fmtDate(t.date)+(t.time?' '+t.time:'');
  const rows=[['類型',TLABEL[t.type]||'其他'],t.date?['日期',fmtDate(t.date)]:null,t.time?['時間',t.time]:null,t.note?['備註',t.note]:null].filter(Boolean);
  document.getElementById('td-rows').innerHTML = rows.map(([k,v])=>`<div class="detail-row"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join('');
  // show ticket image
  const imgEl = document.getElementById('td-img');
  const noImg = document.getElementById('td-no-img');
  if(t.img){ imgEl.src=t.img; imgEl.style.display='block'; noImg.style.display='none'; }
  else { imgEl.style.display='none'; noImg.style.display='block'; }
  openSheet('ticket-detail');
}

function deleteTicket(){
  if(!activeTicketId) return;
  if(!confirm('確定要刪除？')) return;
  tickets = tickets.filter(t=>t.id!==activeTicketId);
  saveAll(); closeSheet('ticket-detail'); renderTickets(); renderItinerary();
}

function renderTickets(){
  const c = document.getElementById('tickets-container');
  if(!tickets.length){ c.innerHTML='<div class="empty-state">還沒有票券<br>點右下角 + 新增</div>'; return; }
  const sorted = [...tickets].sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'').localeCompare(b.time||''));
  const grouped = {};
  sorted.forEach(t=>{ const k=t.date||'x'; if(!grouped[k])grouped[k]=[]; grouped[k].push(t); });
  c.innerHTML = Object.keys(grouped).sort().map(d=>`
    <div class="section-title">${d==='x'?'日期未設定':fmtDate(d)}</div>
    ${grouped[d].map(t=>`
      <div class="ticket-card" onclick="openTicketDetail(${t.id})">
        <div class="tc-icon ${TCLS[t.type]||'other'}">${TICON[t.type]||'🎟'}</div>
        <div class="tc-info"><div class="tc-title">${t.name}</div><div class="tc-sub">${TLABEL[t.type]||''}${t.note?' · '+t.note:''}</div></div>
        <div class="tc-time">${t.time||''}</div>
      </div>`).join('')}`).join('');
}

// ── SHOPPING ──
function submitShop(){
  const name = document.getElementById('sh-name').value.trim();
  if(!name){ alert('請輸入品名'); return; }
  shopItems.push({id:Date.now(), cat:SEL.scat, name,
    note:document.getElementById('sh-note').value.trim(),
    price:document.getElementById('sh-price').value.trim(), done:false});
  saveAll(); closeSheet('add-shop'); renderShopping();
}

function renderShopping(){
  const c = document.getElementById('shopping-container');
  const total=shopItems.length, done=shopItems.filter(i=>i.done).length;
  let html = `<div class="shop-summary">
    <div class="shop-stat"><div class="shop-stat-num">${total}</div><div class="shop-stat-label">總項目</div></div>
    <div class="shop-stat"><div class="shop-stat-num">${done}</div><div class="shop-stat-label">已買到</div></div>
    <div class="shop-stat"><div class="shop-stat-num">${total-done}</div><div class="shop-stat-label">待購買</div></div>
  </div>`;
  const pending=shopItems.filter(i=>!i.done), doneItems=shopItems.filter(i=>i.done);
  CATS.forEach(cat=>{
    const items=[...pending,...doneItems].filter(i=>i.cat===cat);
    if(!items.length) return;
    html+=`<div class="cat-header"><span class="cat-label">${CAT_ICON[cat]} ${cat}</span><button class="cat-add" onclick="openShopWithCat('${cat}')"><i class="ti ti-plus"></i> 新增</button></div>`;
    items.forEach(item=>{
      html+=`<div class="shop-item${item.done?' done':''}" onclick="toggleShop(${item.id})">
        <div class="shop-check">${item.done?'<i class="ti ti-check" style="font-size:13px"></i>':''}</div>
        <div style="flex:1;min-width:0"><div class="shop-item-name">${item.name}</div>${item.note?`<div class="shop-item-note">${item.note}</div>`:''}</div>
        <div class="shop-item-price">${item.price||''}</div>
        <button class="shop-del" onclick="delShop(event,${item.id})"><i class="ti ti-trash"></i></button>
      </div>`;
    });
  });
  if(!shopItems.length) html+='<div class="empty-state">還沒有購物項目<br>點下方分類開始新增</div>';
  html+=`<div class="cat-grid">${CATS.map(cat=>`<button class="cat-btn" onclick="openShopWithCat('${cat}')">${CAT_ICON[cat]} ${cat}</button>`).join('')}</div>`;
  c.innerHTML=html;
}

function openShopWithCat(cat){
  SEL.scat=cat;
  document.querySelectorAll('#add-shop [data-v]').forEach(b=>b.classList.toggle('sel',b.dataset.v===cat));
  ['sh-name','sh-note','sh-price'].forEach(id=>document.getElementById(id).value='');
  openSheet('add-shop');
}

function toggleShop(id){ const i=shopItems.find(x=>x.id===id); if(i){i.done=!i.done; saveAll(); renderShopping();} }
function delShop(e,id){ e.stopPropagation(); if(!confirm('確定刪除？')) return; shopItems=shopItems.filter(x=>x.id!==id); saveAll(); renderShopping(); }

// ── SPOTS ──
function submitSpot(){
  const name = document.getElementById('sp-name').value.trim();
  if(!name){ alert('請輸入景點名稱'); return; }
  spots.push({id:Date.now(), cat:SEL.spcat, name,
    note:document.getElementById('sp-note').value.trim(),
    url:document.getElementById('sp-url').value.trim()});
  saveAll(); closeSheet('add-spot'); renderSpots();
}

function renderSpots(){
  const c = document.getElementById('spots-container');
  if(!spots.length){ c.innerHTML='<div class="empty-state">還沒有景點<br>點右下角 + 新增</div>'; return; }
  const grouped={};
  spots.forEach(s=>{ if(!grouped[s.cat])grouped[s.cat]=[]; grouped[s.cat].push(s); });
  c.innerHTML = Object.keys(grouped).map(cat=>`
    <div class="section-title">${SPCATS[cat]||'📍'} ${cat}</div>
    ${grouped[cat].map(s=>`
      <div class="spot-card">
        <div class="spot-icon">${SPCATS[s.cat]||'📍'}</div>
        <div class="spot-info">
          <div class="spot-name">${s.name}</div>
          <div class="spot-cat">${s.cat}</div>
          ${s.note?`<div class="spot-note">${s.note}</div>`:''}
        </div>
        ${s.url?`<button class="spot-map-btn" onclick="openLink('${s.url}')"><i class="ti ti-map-pin"></i> 地圖</button>`:''}
        <button class="spot-del" onclick="delSpot(${s.id})"><i class="ti ti-trash"></i></button>
      </div>`).join('')}`).join('');
}

function openLink(url){ window.open(url,'_blank'); }
function delSpot(id){ if(!confirm('確定刪除？')) return; spots=spots.filter(s=>s.id!==id); saveAll(); renderSpots(); }

// ── IMPORT ──
function doImport(){
  const raw = document.getElementById('import-json').value.trim();
  try {
    const data = JSON.parse(raw);
    if(!data.trip||!data.days) throw new Error();
    importedItin = data;
    localStorage.setItem(KEYS.itin, JSON.stringify(importedItin));
    closeSheet('import-sheet');
    updateNav(); renderItinerary();
  } catch(e){ document.getElementById('import-err').style.display='block'; }
}

// ── IMAGE HANDLING ──
let pendingImgData = null;

function previewTicketImg(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingImgData = e.target.result;
    document.getElementById('tk-img-thumb').src = pendingImgData;
    document.getElementById('tk-img-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearTicketImg(){
  pendingImgData = null;
  document.getElementById('tk-img-thumb').src = '';
  document.getElementById('tk-img-preview').style.display = 'none';
  document.getElementById('tk-img-file').value = '';
}

function openFullscreen(){
  const t = tickets.find(x=>x.id===activeTicketId);
  if(!t || !t.img) return;
  document.getElementById('fs-img').src = t.img;
  document.getElementById('fs-qr').classList.add('open');
}
function closeFullscreen(){ document.getElementById('fs-qr').classList.remove('open'); }

// ── SHEETS ──
function openSheet(id){ document.getElementById(id).classList.add('open'); }
function closeSheet(id){ document.getElementById(id).classList.remove('open'); }
function bgClose(e,id){ if(e.target===document.getElementById(id)) closeSheet(id); }

// ── SELECTOR BUTTONS ──
function selBtn(btn, key){
  const parent = btn.closest('.type-grid, .form-group');
  if(parent) parent.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  SEL[key] = btn.dataset.v;
}

// ── INIT ──
loadAll();
updateNav();
renderItinerary();
</script>
</body>
</html>
